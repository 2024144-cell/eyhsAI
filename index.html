<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 비전: 실시간 사물 인식기_BIN</title>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <style>
        /* 기본 배경 및 중앙 정렬 (사이버펑크 그라데이션) */
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* 메인 타이틀 스타일 (글로우 효과) */
        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: #38bdf8;
            text-align: center;
            text-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
            letter-spacing: -0.5px;
        }

        p {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
        }

        /* 상태 창 스타일 */
        #status {
            font-weight: 600;
            background: rgba(30, 41, 59, 0.7);
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 13px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.15);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        /* ⭐️ 카메라 박스 컨테이너 (네온 테두리 및 스캔 애니메이션 추가) */
        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 540px; 
            aspect-ratio: 4 / 3; 
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(34, 197, 94, 0.1);
            border: 2px solid rgba(51, 65, 85, 0.8);
        }

        /* 분위기를 더해줄 SF 스타일 코너 장식 */
        #canvas-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid transparent;
            border-radius: 18px;
            pointer-events: none;
            z-index: 10;
        }

        /* 🟢 실시간 AI 스캔 레이저 라인 효과 */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #22c55e, transparent);
            box-shadow: 0 0 12px #22c55e;
            animation: scan 3s linear infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0.3; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0.3; }
        }

        video { display: none; } 

        /* 화면 크기에 맞춰 유연하게 변하는 캔버스 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <h1>📸 CYBER AI VISION</h1>
    <p>실시간 딥러닝 객체 추적 시스템</p>

    <div id="status">🤖 모델 로딩 중... (약 14MB)</div>

    <div id="canvas-container">
        <div class="scan-line"></div>
